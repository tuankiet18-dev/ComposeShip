# BUG #6 FIX: Set a fixed project name so the Docker network is always
# named 'oneclick_oneclick-net' regardless of the folder name.
# This must match TRAEFIK_NETWORK in .env
name: oneclick

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: oneclick-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneclickhost}
      POSTGRES_USER: ${POSTGRES_USER:-oneclick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneclick} -d ${POSTGRES_DB:-oneclickhost}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # Traefik Reverse Proxy
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.4
    container_name: oneclick-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # ASP.NET Core API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oneclick-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=db;Port=5432;Database=oneclickhost;Username=oneclick;Password=change_me_in_production}
      Jwt__Secret: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-min-32-chars!!}
      Jwt__Issuer: ${JWT_ISSUER:-oneclick-host}
      Jwt__Audience: ${JWT_AUDIENCE:-oneclick-host-client}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      # ISSUE #10 FIX: ASP.NET Core maps Cors__AllowedOrigins → Cors:AllowedOrigins
      # Set CORS_ORIGINS in .env to your production domain
      Cors__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # Python Worker
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: oneclick-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-oneclickhost}
      POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      BUILD_TIMEOUT: ${WORKER_BUILD_TIMEOUT:-900}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/tmp/oneclick-workspace}
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}
      TRAEFIK_NETWORK: ${TRAEFIK_NETWORK:-oneclick_oneclick-net}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_workspace:/tmp/oneclick-workspace
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oneclick-net

  # ─────────────────────────────────────────────
  # Next.js Frontend Dashboard
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oneclick-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - oneclick-net

volumes:
  postgres_data:
  worker_workspace:

networks:
  oneclick-net:
    driver: bridge
