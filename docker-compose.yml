# BUG #6 FIX: Set a fixed project name so the Docker network is always
# named 'composeship_composeship-net' regardless of the folder name.
# This must match TRAEFIK_NETWORK in .env
name: composeship

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${INFRA_LOG_MAX_SIZE:-10m}
    max-file: ${INFRA_LOG_MAX_FILES:-3}

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    logging: *default-logging
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    container_name: composeship-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-composeship}
      POSTGRES_USER: ${POSTGRES_USER:-composeship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-composeship_dev_password}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-composeship} -d ${POSTGRES_DB:-composeship}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - composeship-net

  # ─────────────────────────────────────────────
  # Traefik Reverse Proxy
  # ─────────────────────────────────────────────
  traefik:
    logging: *default-logging
    image: traefik:v3.4@sha256:06ddf61ee653caf4f4211a604e657f084f4727f762c16f826c97aafbefcb279e
    container_name: composeship-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "127.0.0.1:8081:8080"   # Local-only Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - composeship-net

  # ─────────────────────────────────────────────
  # ASP.NET Core API
  # ─────────────────────────────────────────────
  api:
    logging: *default-logging
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: composeship-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=db;Port=5432;Database=composeship;Username=composeship;Password=${POSTGRES_PASSWORD:-composeship_dev_password}}
      Jwt__Secret: ${JWT_SECRET:-composeship-dev-jwt-secret-minimum-32-chars}
      SecretEncryption__Key: ${COMPOSESHIP_SECRET_KEY:-composeship-dev-secret-key-minimum-32-chars}
      Invites__CodePepper: ${INVITE_CODE_PEPPER:-composeship-dev-invite-code-pepper-minimum-32-chars}
      Invites__Required: ${INVITES_REQUIRED:-true}
      Invites__MaxAccounts: ${INVITES_MAX_ACCOUNTS:-10}
      ForwardedHeaders__TrustedNetworks: ${FORWARDED_HEADERS_TRUSTED_NETWORKS:-172.16.0.0/12}
      DataProtection__KeyPath: ${DATA_PROTECTION_KEY_PATH:-/var/composeship/data-protection}
      Jwt__Issuer: ${JWT_ISSUER:-composeship}
      Jwt__Audience: ${JWT_AUDIENCE:-composeship-client}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      COMPOSESHIP_ENABLE_POST_START_COMMANDS: ${COMPOSESHIP_ENABLE_POST_START_COMMANDS:-false}
      # ISSUE #10 FIX: ASP.NET Core maps Cors__AllowedOrigins → Cors:AllowedOrigins
      # Set CORS_ORIGINS in .env to your production domain
      AI__Provider: ${AI_PROVIDER:-OpenAI}
      AI__ApiKey: ${AI_API_KEY:-}
      AI__Model: ${AI_MODEL:-gpt-4o-mini}
      Cors__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000}
      ExecutionNodes__RegistrationToken: ${EXECUTION_NODE_REGISTRATION_TOKEN:-}
      ExecutionNodes__LeaseTimeoutSeconds: ${EXECUTION_NODE_LEASE_TIMEOUT_SECONDS:-120}
      ExecutionNodes__MaxLeaseRetries: ${EXECUTION_NODE_MAX_LEASE_RETRIES:-3}
      ExecutionNodes__RetryDelaySeconds: ${EXECUTION_NODE_RETRY_DELAY_SECONDS:-30}
      Traefik__DynamicDirectory: ${TRAEFIK_DYNAMIC_DIR:-/etc/traefik/dynamic}
      ComposeShip__LogMaxBytes: ${LOG_MAX_BYTES:-200000}
      ComposeShip__AutoMigrateDatabase: ${AUTO_MIGRATE_DATABASE:-false}
      Capacity__MaxActiveProjects: ${MAX_ACTIVE_PROJECTS:-3}
      Capacity__MaxQueuedDeployments: ${MAX_QUEUED_DEPLOYMENTS:-10}
    ports:
      - "${API_BIND:-127.0.0.1}:5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_data_protection:/var/composeship/data-protection
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=(Host(`localhost`) || Host(`${TRAEFIK_DOMAIN:-localhost}`)) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
    networks:
      - composeship-net

  # ─────────────────────────────────────────────
  # Python Worker
  # ─────────────────────────────────────────────
  worker:
    logging: *default-logging
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: composeship-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-composeship}:${POSTGRES_PASSWORD:-composeship_dev_password}@db:5432/${POSTGRES_DB:-composeship}
      POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_MODE: ${WORKER_MODE:-singlehost-dev}
      BUILD_TIMEOUT: ${WORKER_BUILD_TIMEOUT:-900}
      MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-1}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-200000}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/tmp/composeship-workspace}
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}
      TRAEFIK_NETWORK: ${TRAEFIK_NETWORK:-composeship_composeship-net}
      CLOUDFLARED_IMAGE: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe}
      CONTROL_PLANE_API_URL: ${CONTROL_PLANE_API_URL:-http://api:5000/api}
      EXECUTION_NODE_ID: ${EXECUTION_NODE_ID:-}
      EXECUTION_NODE_TOKEN: ${EXECUTION_NODE_TOKEN:-}
      EXECUTION_NODE_PRIVATE_HOST: ${EXECUTION_NODE_PRIVATE_HOST:-}
      EXECUTION_NODE_BIND_HOST: ${EXECUTION_NODE_BIND_HOST:-0.0.0.0}
      EXECUTION_NODE_REGISTRATION_TOKEN: ${EXECUTION_NODE_REGISTRATION_TOKEN:-}
      COMPOSESHIP_SECRET_KEY: ${COMPOSESHIP_SECRET_KEY:-composeship-dev-secret-key-minimum-32-chars}
      COMPOSESHIP_ENABLE_POST_START_COMMANDS: ${COMPOSESHIP_ENABLE_POST_START_COMMANDS:-false}
      CONTAINER_MEMORY_LIMIT: ${CONTAINER_MEMORY_LIMIT:-256m}
      CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-0.5}
      CONTAINER_PIDS_LIMIT: ${CONTAINER_PIDS_LIMIT:-256}
      CONTAINER_LOG_MAX_SIZE: ${CONTAINER_LOG_MAX_SIZE:-10m}
      CONTAINER_LOG_MAX_FILES: ${CONTAINER_LOG_MAX_FILES:-3}
      DISK_MIN_FREE_BYTES: ${DISK_MIN_FREE_BYTES:-5368709120}
      DISK_MIN_FREE_PERCENT: ${DISK_MIN_FREE_PERCENT:-10}
      DISK_CLEANUP_FREE_PERCENT: ${DISK_CLEANUP_FREE_PERCENT:-20}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-900}
      CLEANUP_ARTIFACT_MAX_AGE_SECONDS: ${CLEANUP_ARTIFACT_MAX_AGE_SECONDS:-86400}
      CLEANUP_BUILD_CACHE_MAX_AGE_SECONDS: ${CLEANUP_BUILD_CACHE_MAX_AGE_SECONDS:-86400}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_workspace:/tmp/composeship-workspace
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - composeship-net

  # ─────────────────────────────────────────────
  # React + Vite Frontend Dashboard
  # ─────────────────────────────────────────────
  frontend:
    logging: *default-logging
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: composeship-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`${TRAEFIK_DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - composeship-net

volumes:
  postgres_data:
  api_data_protection:
  worker_workspace:

networks:
  composeship-net:
    driver: bridge
