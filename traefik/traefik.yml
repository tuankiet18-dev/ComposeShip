# Traefik Static Configuration
# ─────────────────────
# LOCAL DEV (Windows): Uses File provider only (Docker provider disabled)
# AWS PRODUCTION (Linux): Uncomment the docker: provider block below

api:
  dashboard: true
  insecure: true    # ISSUE #12: Change to false on production and add a router rule with auth middleware

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  # ── PRODUCTION (Linux EC2): Uncomment this block ──────────────────────────
  # docker:
  #   endpoint: "unix:///var/run/docker.sock"
  #   exposedByDefault: false
  #   network: oneclick_oneclick-net
  # ──────────────────────────────────────────────────────────────────────────

  # ── ALWAYS ACTIVE: File Provider for user-deployed containers ─────────────
  # Also handles API + Frontend routing on Windows dev (Docker provider off)
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: INFO

accessLog:
  filePath: "/etc/traefik/access.log"
  bufferingSize: 100
