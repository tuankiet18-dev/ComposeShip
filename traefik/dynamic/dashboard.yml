# Dynamic routing rules for trusted OneClick-Host control-plane services.
# Traefik reaches these services over control-net; user workloads are only
# attached to apps-net and cannot resolve db/api/worker directly.

http:
  routers:
    api-router:
      rule: "(Host(`127.0.0.1.sslip.io`) || Host(`localhost`)) && PathPrefix(`/api`)"
      service: api-service
      entryPoints:
        - web
      priority: 100

    frontend-router:
      rule: "Host(`127.0.0.1.sslip.io`) || Host(`localhost`)"
      service: frontend-service
      entryPoints:
        - web
      priority: 1

  services:
    api-service:
      loadBalancer:
        servers:
          - url: "http://api:5000"

    frontend-service:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
