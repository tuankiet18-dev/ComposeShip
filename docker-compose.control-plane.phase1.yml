name: oneclick

services:
  db:
    image: postgres:16-alpine
    container_name: oneclick-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneclickhost}
      POSTGRES_USER: ${POSTGRES_USER:-oneclick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneclick_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneclick} -d ${POSTGRES_DB:-oneclickhost}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oneclick-net

  traefik:
    image: traefik:v3.4
    container_name: oneclick-traefik
    restart: unless-stopped
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--api.dashboard=false"
      - "--accesslog=true"
    ports:
      - "80:80"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - oneclick-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oneclick-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=db;Port=5432;Database=oneclickhost;Username=oneclick;Password=${POSTGRES_PASSWORD:-oneclick_dev_password}}
      Jwt__Secret: ${JWT_SECRET}
      SecretEncryption__Key: ${ONECLICK_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-oneclick-host}
      Jwt__Audience: ${JWT_AUDIENCE:-oneclick-host-client}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-24}
      Auth__CookieSecure: ${AUTH_COOKIE_SECURE:-true}
      AI__Provider: ${AI_PROVIDER:-OpenAI}
      AI__ApiKey: ${AI_API_KEY:-}
      AI__Model: ${AI_MODEL:-gpt-4o-mini}
      Cors__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000}
      ExecutionNodes__RegistrationToken: ${EXECUTION_NODE_REGISTRATION_TOKEN:-}
      ExecutionNodes__LeaseTimeoutSeconds: ${EXECUTION_NODE_LEASE_TIMEOUT_SECONDS:-120}
      ExecutionNodes__MaxLeaseRetries: ${EXECUTION_NODE_MAX_LEASE_RETRIES:-3}
      ExecutionNodes__RetryDelaySeconds: ${EXECUTION_NODE_RETRY_DELAY_SECONDS:-30}
      Traefik__DynamicDirectory: ${TRAEFIK_DYNAMIC_DIR:-/etc/traefik/dynamic}
      OneClick__LogMaxBytes: ${LOG_MAX_BYTES:-200000}
      OneClick__AutoMigrateDatabase: ${AUTO_MIGRATE_DATABASE:-false}
    ports:
      - "${API_BIND:-127.0.0.1}:5000:5000"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oneclick-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: oneclick-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD:-oneclick_dev_password}@db:5432/${POSTGRES_DB:-oneclickhost}
      POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_MODE: dispatcher
      BUILD_TIMEOUT: ${WORKER_BUILD_TIMEOUT:-900}
      MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-1}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-200000}
      CONTROL_PLANE_API_URL: http://api:5000/api
      ONECLICK_SECRET_KEY: ${ONECLICK_SECRET_KEY}
      ONECLICK_ENABLE_POST_START_COMMANDS: false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oneclick-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: oneclick-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    networks:
      - oneclick-net

volumes:
  postgres_data:

networks:
  oneclick-net:
    driver: bridge
