name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Standard LTS
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build React/Vite dashboard
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Audit production npm dependencies
        run: npm audit --omit=dev --audit-level=high

  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/OneClickHost.Api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Extracted from the .csproj configuration

      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet restore -p:NuGetAudit=true -p:NuGetAuditLevel=high --warnaserror:NU1903 --warnaserror:NU1904

      - name: Build ASP.NET Core
        run: dotnet build --no-restore --configuration Release

      - name: Run backend console tests
        run: dotnet run --project ../OneClickHost.Api.Tests/OneClickHost.Api.Tests.csproj --configuration Release

      - name: Report NuGet dependency audit
        run: dotnet list package --vulnerable --include-transitive

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Git history and working tree for secrets
        uses: gitleaks/gitleaks-action@v2

  worker:
    name: Check Python Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest pip-audit

      - name: Syntax Check
        # Stop the build if there are critical Python syntax errors or undefined names.
        # This is a relaxed check that won't fail on formatting (like line length).
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run worker tests
        run: python -m pytest tests

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  docker:
    name: Validate Docker Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.control-plane.yml config -q
          docker compose -f docker-compose.execution.yml config -q
        
      - name: Verify Docker Builds
        # Safely attempts to build the Docker images defined in docker-compose.yml 
        # to ensure the Dockerfiles are valid. It does not push the images anywhere.
        run: docker compose build

  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/aws/mvp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format and validate release topology
        run: |
          terraform init -backend=false
          terraform fmt -check
          terraform validate
