services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://composeship:composeship@db:5432/composeship_fixture}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: composeship_fixture
      POSTGRES_USER: composeship
      POSTGRES_PASSWORD: composeship
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composeship -d composeship_fixture"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
